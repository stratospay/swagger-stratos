openapi: 3.0.3
info:
  title: Stratos API
  version: 1.0.0
  description: '# Introduction


    Welcome


    Stratos Payment offers a unified API to integrate financial service to your application.


    ## Can we assist you?


    Thank you for taking the time to use Stratos Payment APIs.


    Please contact us at [support@stratospayments.com](https://mailto:support@stratospayments.com)
    if you have any queries, feature suggestions, or discover any problems.


    StartFragment


    # Environment


    To make testing and developing with Stratos Payment quick and easy, we make use
    of the same API endpoint for sandbox and production, the only difference is the
    keys used when calling the APIs.


    | Environment | Purpose | Base URL |

    | --- | --- | --- |

    | Sandbox | The sandbox environment is dedicated to test and development phases.
    | [https://stratospay.com/api/v1](https://stratospay.com/api) |

    | Production | The production environment is dedicated for live transactions.
    | [https://stratospay.com/api/v1](https://stratospay.com/api) |'
servers:
- url: https://stratospay.com/api/v1
  description: Production / Sandbox (use appropriate API key)
tags:
- name: Onboarded Customers - Onboarding
- name: Onboarded Customers - Virtual Cards
- name: Onboarded Customers - Crypto Wallets
- name: Onboarded Customers - Fiat Wallets
- name: Onboarded Customers - Transactions
- name: Onboarded Customers - Remittance Recipients
- name: Onboarded Customers - MCP Server
- name: Onboarded Customers - Multi Factor Security
- name: Onboarded Customers - Swap & Payout
- name: Merchant (Main Account) - Payment Collection
- name: Merchant (Main Account) - Transactions
- name: Merchant (Main Account) - Remittance
- name: Merchant (Main Account) - Blockchain Ledger
- name: Merchant (Main Account) - Local Transfer
- name: Merchant (Main Account) - General
- name: Merchant (Main Account) - Invoice
paths:
  /customer/director/all/{customer_id}:
    get:
      summary: Get all directors
      description: >
        Returns a comprehensive list of all directors associated with a specific onboarded customer.
      tags:
        - Onboarded Customers - Onboarding
      security:
        - bearerAuth: [ ]
      parameters:
        - name: customer_id
          in: path
          required: true
          description: The unique identifier of the customer whose directors you want to retrieve.
          schema:
            type: string
      responses:
        '200':
          description: OK - Returns an array of director objects.
        '400':
          description: Bad Request - Check the customer_id format.
        '401':
          description: Unauthorized - Bearer token missing or invalid.
        '422':
          description: Unprocessable Entity - Valid ID but record not found.
  /customer/director/create/{customer_id}:
    post:
      summary: Create a director
      description: >
        Adds a new director to an existing customer profile. 
        Pass your `{api_key}` as a bearer token in the request header to authorize this call.
      tags:
        - Onboarded Customers - Onboarding
      security:
        - bearerAuth: [ ]
      parameters:
        - name: customer_id
          in: path
          required: true
          description: The unique identifier of the customer (onboarded entity).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                  description: Director's legal first name
                  example: John

                middle_name:
                  type: string
                  description: Director's legal middle name
                  example: Michael

                last_name:
                  type: string
                  description: Director's legal last name
                  example: Derrick

                email:
                  type: string
                  format: email
                  description: Director's email address
                  example: derrick@remote.com

                phone:
                  type: string
                  description: Director's phone number, including country dialing code if applicable
                  example: +234901234567899

                phone_iso2:
                  type: string
                  description: ISO 3166-1 alpha-2 country code for the phone number
                  example: NG

                country:
                  type: string
                  description: ISO 3166-1 alpha-2 country code of residence
                  example: US

                state:
                  type: string
                  description: State, province, or subdivision code/name for the director's address
                  example: DE

                city:
                  type: string
                  description: City of residence
                  example: Wilmington

                street:
                  type: string
                  description: Street address of the director
                  example: 24 Maple Avenue

                postal_code:
                  type: string
                  description: Postal or ZIP code for the address
                  example: 90000

                ownership:
                  type: integer
                  description: Percentage of shares owned by the director
                  example: 10

                position:
                  type: string
                  description: Director's role or position in the company
                  example: CTO

                birthday:
                  type: string
                  description: Director's date of birth in DD-MM-YYYY format
                  example: 20-06-1976

              required:
                - first_name
                - middle_name
                - last_name
                - email
                - phone
                - phone_iso2
                - country
                - state
                - city
                - street
                - postal_code
                - ownership
                - position
                - birthday
      responses:
        '200':
          description: Director successfully added
          content:
            application/json:
              example:
                message: "Director Added"
                status: "success"
                data:
                  id: "55196c0f-31c7-4d1f-8b74-25e9fbf6810b"
                  first_name: "John"
                  last_name: "Derrick"
                  email: "Derrick@remote.com"
                  phone: "+234901234567899"
                  country: "US"
                  state: "DE"
                  city: "City"
                  street: "Address"
                  postal_code: "90000"
                  birthday: "29-06-1999"
                  ownership: "10"
                  position: "CTO"
                  mode: "test"
        '400':
          description: Bad Request - Missing required fields or invalid format
        '401':
          description: Unauthorized - Invalid API key
        '422':
          description: Unprocessable Entity - Validation error
  /customer/director/all/{customer_id}/{director_id}:
    get:
      summary: Get a single director
      description: >
        Retrieves the full profile details for a specific director belonging to a specific customer.
      tags:
        - Onboarded Customers - Onboarding
      security:
        - bearerAuth: [ ]
      parameters:
        - name: customer_id
          in: path
          required: true
          description: The unique identifier of the customer.
          schema:
            type: string
        - name: director_id
          in: path
          required: true
          description: The unique identifier of the specific director to retrieve.
          schema:
            type: string
      responses:
        '200':
          description: OK - Successfully retrieved director details.
          content:
            application/json:
              example:
                message: "Director Found"
                status: "success"
                data:
                  id: "55196c0f-31c7-4d1f-8b74-25e9fbf6810b"
                  first_name: "John"
                  last_name: "Derrick"
                  email: "Derrick@remote.com"
                  phone: "+234901234567899"
                  country: "US"
                  state: "DE"
                  city: "City"
                  street: "Address"
                  postal_code: "90000"
                  birthday: "29-06-1999"
                  ownership: "10"
                  position: "CTO"
                  mode: "test"
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
  /customer/director/update/{customer_id}/{director_id}:
    post:
      summary: Update director
      description: >
        Updates the existing profile details for a specific director associated with a customer. 
        Pass your `{api_key}` as a bearer token in the request header to authorize this call.
      tags:
        - Onboarded Customers - Onboarding
      security:
        - bearerAuth: [ ]
      parameters:
        - name: customer_id
          in: path
          required: true
          description: The unique identifier of the customer (onboarded entity).
          schema:
            type: string
        - name: director_id
          in: path
          required: true
          description: The unique identifier of the director to be updated.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                  description: Director's legal first name
                  example: John

                middle_name:
                  type: string
                  description: Director's legal middle name
                  example: Michael

                last_name:
                  type: string
                  description: Director's legal last name
                  example: Derrick

                email:
                  type: string
                  format: email
                  description: Director's email address
                  example: derrick@remote.com

                phone:
                  type: string
                  description: Director's phone number, including country dialing code if applicable
                  example: +234901234567899

                phone_iso2:
                  type: string
                  description: ISO 3166-1 alpha-2 country code for the phone number
                  example: NG

                country:
                  type: string
                  description: ISO 3166-1 alpha-2 country code of residence
                  example: US

                state:
                  type: string
                  description: State, province, or subdivision code/name for the director's address
                  example: DE

                city:
                  type: string
                  description: City of residence
                  example: Wilmington

                street:
                  type: string
                  description: Street address of the director
                  example: 24 Maple Avenue

                postal_code:
                  type: string
                  description: Postal or ZIP code for the address
                  example: 90000

                ownership:
                  type: integer
                  description: Percentage of shares owned by the director
                  example: 10

                position:
                  type: string
                  description: Director's role or position in the company
                  example: CTO

                birthday:
                  type: string
                  description: Director's date of birth in DD-MM-YYYY format
                  example: 20-06-1976

              required:
                - first_name
                - middle_name
                - last_name
                - email
                - phone
                - phone_iso2
                - country
                - state
                - city
                - street
                - postal_code
                - ownership
                - position
                - birthday
      responses:
        '200':
          description: Director profile successfully updated
          content:
            application/json:
              example:
                message: "Director Updated"
                status: "success"
                data:
                  id: "55196c0f-31c7-4d1f-8b74-25e9fbf6810b"
                  first_name: "John"
                  last_name: "Derrick"
                  email: "Derrick@remote.com"
                  phone: "+234901234567899"
                  country: "US"
                  state: "DE"
                  city: "City"
                  street: "Address"
                  postal_code: "90000"
                  birthday: "29-06-1999"
                  ownership: "10"
                  position: "CTO"
                  mode: "test"
        '400':
          description: Bad Request - Missing parameters or invalid JSON structure
        '401':
          description: Unauthorized - Bearer token missing or invalid
        '422':
          description: Unprocessable Entity - Validation failed for specific fields
  /customer/director/delete/{customer_id}/{director_id}:
    delete:
      summary: Delete director
      tags:
      - Onboarded Customers - Onboarding
