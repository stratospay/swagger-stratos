  /customer/recipient/create/{customer_id}:
    post:
      summary: Add recipient
      tags:
      - Onboarded Customers - Remittance Recipients
      security:
      - bearerAuth: []
      parameters:
      - name: customer_id
        in: path
        description: The ID or MCP Key of the onboarded customer.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                international_remittance_id:
                  type: string
                  description: ID of Recipient Country, learn more about getting international_remittance_id from /reference/currencies
                first_name:
                  type: string
                  description: The recipient's firstname
                middle_name:
                  type: string
                  description: The recipient's middlename(optional)
                last_name:
                  type: string
                  description: The recipient's lastname
                email:
                  type: string
                  description: The recipient's email address
                phone:
                  type: string
                  description: The phone number of the recipient
                phone_iso2:
                  type: string
                  description: Recipient Phone number iso2
                delivery_method:
                  type: string
                  description: Recipient Payout Method, must be between, bank, mobile_money, cash_pickup
                bank_name:
                  type: string
                  description: The bank name
                entity_type:
                  type: string
                  description: Sender Entity Type, either personal or business, this is required if delivery_method is bank
                routing_type:
                  type: string
                  description: Can be ACH_CODE, SWIFT, IFSC, SORT_CODE, BANK_CODE, BRANCH_CODE, BSB_CODE, LOCATION_ID, TRANSIT_NUMBER, This is always validated against recipient country, required if delivery_method is bank. Verify if routing_type is correct via http://stratos.test/user/docs/reference/banks.
                routing_code:
                  type: string
                  description: Bank routing code, required if delivery_method is bank. Verify if routing_code is correct via http://stratos.test/user/docs/reference/banks.
                acct_type_id:
                  type: string
                  description: Recipient Account Type, required if delivery_method is bank. Learn more about getting acct_type_id from http://stratos.test/user/docs/reference/currencies under international remittance object.
                acct_no:
                  type: string
                  description: Recipient Bank Account Number, required if delivery_method is bank.
                acct_name:
                  type: string
                  description: Recipient Bank Account Name, required if delivery_method is bank.
                state:
                  type: string
                  description: Recipient State iso2
                city:
                  type: string
                  description: Recipient city
                address:
                  type: string
                  description: Recipient address
                postal_code:
                  type: string
                  description: Recipient Postal/Zip Code
              required:
              - international_remittance_id
              - first_name
              - middle_name
              - last_name
              - email
              - phone
              - phone_iso2
              - delivery_method
              - bank_name
              - entity_type
              - routing_type
              - routing_code
              - acct_type_id
              - acct_no
              - acct_name
              - state
              - city
              - address
              - postal_code
