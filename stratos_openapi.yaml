  /customer/update:
    post:
      summary: Update customer
      tags:
      - Onboarded Customers - Onboarding
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gender:
                  type: string
                  description: Customer's gender
                  example: "male"

                first_name:
                  type: string
                  description: Customer's legal first name
                  example: "John"

                middle_name:
                  type: string
                  description: Customer's legal middle name
                  example: "Michael"

                last_name:
                  type: string
                  description: Customer's legal last name
                  example: "Doe"

                email:
                  type: string
                  format: email
                  description: Customer's email address
                  example: "john.doe@example.com"

                phone:
                  type: string
                  description: Customer's phone number in international format, including country code
                  example: "+12025550147"

                phone_iso2:
                  type: string
                  description: ISO 3166-1 alpha-2 country code associated with the phone number
                  example: "US"

                country:
                  type: string
                  description: ISO 3166-1 alpha-2 country code of the customer's country of residence
                  example: "US"

                state:
                  type: string
                  description: State, province, or administrative region of the customer's address
                  example: "CA"

                city:
                  type: string
                  description: City of the customer's residential address
                  example: "Los Angeles"

                street:
                  type: string
                  description: Street address of the customer, including house number and street name
                  example: "742 Evergreen Terrace"

                postal_code:
                  type: string
                  description: Postal or ZIP code of the customer's address
                  example: "90001"

                birthday:
                  type: string
                  description: Customer's date of birth in DD-MM-YYYY format
                  example: "20-06-1976"

                source_of_fund_id:
                  type: string
                  description: Identifier representing the customer's source of funds
                  example: "salary"

                ip_address:
                  type: string
                  description: IP address from which the onboarding or update request originated
                  example: "102.89.34.12"

                id_type:
                  type: string
                  description: Type of identification document being provided for the customer
                  example: "passport"

                id_number:
                  type: string
                  description: Identification document number corresponding to the selected id_type
                  example: "XK1234567"

              required:
                - gender
                - first_name
                - middle_name
                - last_name
                - email
                - phone
                - phone_iso2
                - country
                - state
                - city
                - street
                - postal_code
                - birthday
                - source_of_fund_id
                - ip_address
                - id_type
                - id_number
