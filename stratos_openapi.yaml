  /customer/upload_document/{customer_id}/{document_type}:
    post:
      summary: Add Kyc Document
      tags:
      - Onboarded Customers - Onboarding
      security:
      - bearerAuth: []
      parameters:
      - name: customer_id
        in: path
        description: The unique identifier of the customer
        required: true
        schema:
          type: string
      - name: document_type
        in: path
        description: Must be document or selfie.Eg image/svg+xml,image/jpeg,image/png,image/webp,video/x-msvideo,image/gif,image/x-icon,image/jpeg
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Must be an image of a selfie or a document
