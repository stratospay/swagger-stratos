          description: Bad Request
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currency
                - discount_type
                - discount_value
                - tax_type
                - tax_value
                - items
                - title
                - customer
                - due_date
                - emails
              properties:
                currency:
                  type: string
                  pattern: '^[A-Z,a-z]{3}$'
                  description: Currency code in ISO 4217 format (3 characters). Example  usd, eur, gbp.
                  example: usd
                discount_type:
                  type: string
                  enum: [ fixed, percentage ]
                  description: Type of discount to apply. Allowed values e.g fixed, percentage.
                discount_value:
                  type: number
                  minimum: 0
                  description: Discount value. Must be a number greater than or equal to 0.
                tax_type:
                  type: string
                  enum: [ fixed, percentage ]
                  description: Type of tax to apply. Allowed values e.g fixed, percentage.
                tax_value:
                  type: number
                  minimum: 0
                  description: Tax value. Must be a number greater than or equal to 0.
                items:
                  type: array
                  minItems: 1
                  description: Array of invoice items. At least one item is required.
                  items:
                    type: object
                    required: [ description, quantity, amount ]
                    properties:
                      description:
                        type: string
                        description: Description of the item.
                      quantity:
                        type: integer
                        minimum: 1
                        description: Quantity of the item. Must be at least 1.
                      amount:
                        type: number
                        minimum: 0.01
                        description: Price of the item. Must be at least 0.01.
                title:
                  type: string
                  maxLength: 255
                  description: Invoice number or title. Maximum 255 characters.
                customer:
                  type: string
                  format: uuid
                  description: ID of the customer. Must be a valid customer UUID.
                due_date:
                  type: string
                  format: date
                  description: Invoice due date in Y-m-d format. Must be today or a future date.
                emails:
                  type: array
                  description: Array of email objects to receive payment notification. At least one email is required.
                  minItems: 1
                  items:
                    type: object
                    required: [ email ]
