      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
  /customer/create:
    post:
      summary: Create customer - personal or business
      description: >
        Creates a new customer record on the Stratos platform. 
        Pass your `{api_key}` as a bearer token in the request header to authorize this call.
      tags:
        - Onboarded Customers - Onboarding
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                account_type:
                  type: string
                  description: "Account type must be personal or business"
                  enum: [ personal, business ]
                  example: personal
                first_name:
                  type: string
                  description: "First Name of the customer"
                  example: John
                middle_name:
                  type: string
                  description: "Middle Name (Optional)"
                  example: Dennis
                last_name:
                  type: string
                  description: "Last Name of the customer"
                  example: Joe
                email:
                  type: string
                  description: "Valid email address for the customer"
                  example: johndoe@remote.com
                phone:
                  type: string
                  description: "Phone number (include international prefix)"
                  example: +12025550147
                phone_iso2:
                  type: string
                  description: "Two-letter ISO country code for the phone number"
                  example: US
                country:
                  type: string
                  description: "Country ISO2 code (e.g., US, NG, GB)"
                  example: US
                platform_account_id:
                  type: string
                  description: "Your platform account ID. When supplied, customer will be onboarded under you"
                business_details:
                  type: object
                  description: "Required if account_type is 'business'"
                  properties:
                    business_name:
                      type: string
                      description: "Business Legal Name"
                      example: John Remote Corporation
                  required:
                    - business_name
              required:
                - account_type
                - first_name
                - last_name
                - email
                - phone
                - phone_iso2
                - country
      responses:
        '200':
          description: OK - User successfully onboarded
          content:
            application/json:
              # Example taken directly from your code snippet
              example:
                message: "User Onboarded"
                status: "success"
                data:
                  id: "0917324"
                  mode: "test"
                  first_name: "Scott"
                  last_name: "Mccal"
                  email: "74derrick@remote.com"
                  kyc_status: "PENDING"
        '400':
          description: Bad Request - Validation error
        '401':
          description: Unauthorized - Invalid or missing API Key
        '422':
          description: Unprocessable Entity - Data validation failed
  /customer/submit_kyc/{customer_id}:
    post:
      summary: Submit KYC
      tags:
